{{define "content"}}
<style>
    .section-groups {
        display: flex;
        flex-wrap: wrap;
        gap: 0;
        margin-bottom: 24px;
        border-bottom: 1px solid #222;
    }
    .section-group {
        display: flex;
        align-items: center;
        gap: 0;
    }
    .section-group:not(:first-child)::before {
        content: "";
        display: block;
        width: 1px;
        height: 24px;
        background: #333;
        margin: 0 4px;
    }
    .group-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #555;
        padding: 10px 8px 10px 12px;
        white-space: nowrap;
    }
    .section-group a {
        padding: 10px 14px;
        color: #888;
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        white-space: nowrap;
    }
    .section-group a:hover {
        color: #e0e0e0;
        text-decoration: none;
    }
    .section-group a.active {
        color: #818cf8;
        border-bottom-color: #6366f1;
    }
    .markdown-body {
        line-height: 1.7;
        font-size: 14px;
    }
    .markdown-body h1 {
        font-size: 24px;
        font-weight: 700;
        margin: 0 0 16px 0;
        padding-bottom: 8px;
        border-bottom: 1px solid #222;
        color: #fff;
    }
    .markdown-body h2 {
        font-size: 20px;
        font-weight: 600;
        margin: 32px 0 12px 0;
        color: #e0e0e0;
    }
    .markdown-body h3 {
        font-size: 16px;
        font-weight: 600;
        margin: 24px 0 8px 0;
        color: #c0c0c0;
    }
    .markdown-body h4 {
        font-size: 14px;
        font-weight: 600;
        margin: 20px 0 8px 0;
        color: #a0a0a0;
    }
    .markdown-body p {
        margin: 0 0 12px 0;
    }
    .markdown-body ul, .markdown-body ol {
        margin: 0 0 12px 0;
        padding-left: 24px;
    }
    .markdown-body li {
        margin-bottom: 4px;
    }
    .markdown-body hr {
        border: none;
        border-top: 1px solid #222;
        margin: 32px 0;
    }
    .markdown-body pre {
        background: #111;
        border: 1px solid #222;
        border-radius: 6px;
        padding: 14px 16px;
        overflow-x: auto;
        margin: 0 0 16px 0;
        font-size: 13px;
        line-height: 1.5;
    }
    .markdown-body code {
        font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, Consolas, monospace;
        font-size: 13px;
    }
    .markdown-body :not(pre) > code {
        background: #1a1a2e;
        padding: 2px 6px;
        border-radius: 3px;
        color: #c4b5fd;
    }
    .markdown-body table {
        width: 100%;
        border-collapse: collapse;
        margin: 0 0 16px 0;
        font-size: 13px;
    }
    .markdown-body th {
        text-align: left;
        padding: 8px 12px;
        border-bottom: 2px solid #333;
        color: #888;
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .markdown-body td {
        padding: 8px 12px;
        border-bottom: 1px solid #1f1f1f;
    }
    .markdown-body tr:hover {
        background: #111;
    }
    .markdown-body blockquote {
        border-left: 3px solid #6366f1;
        margin: 0 0 16px 0;
        padding: 8px 16px;
        color: #aaa;
        background: #0d0d14;
    }
    .markdown-body strong {
        color: #fff;
        font-weight: 600;
    }
    .markdown-body a {
        color: #818cf8;
    }
    .markdown-body a:hover {
        text-decoration: underline;
    }
</style>
<div class="section-groups">
    {{range .Data.SectionGroups}}
    <div class="section-group">
        <span class="group-label">{{.Label}}</span>
        {{range .Sections}}
        <a href="/docs/{{.Key}}"{{if eq .Key $.Data.ActiveSection}} class="active"{{end}}>{{.Label}}</a>
        {{end}}
    </div>
    {{end}}
</div>
<div class="markdown-body">
    {{.Data.Content}}
</div>
{{end}}
