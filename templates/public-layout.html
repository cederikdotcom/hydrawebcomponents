<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — {{.Brand.Prefix}}{{.Brand.Suffix}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: #111;
            border-bottom: 1px solid #222;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        .header h1 a {
            color: inherit;
            text-decoration: none;
        }
        .header h1 span { color: #6366f1; }
        .header nav a {
            color: #888;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }
        .header nav a:hover { color: #fff; }
        .container {
            max-width: 80%;
            margin: 0 auto;
            padding: 32px 24px;
        }
        a { color: #818cf8; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <h1><a href="/"><span>{{.Brand.Prefix}}</span>{{.Brand.Suffix}}</a></h1>
        <nav>
            <a href="/docs">Docs</a>
            <a href="/login">Admin</a>
        </nav>
    </div>
    <div class="container">
        {{block "content" .}}{{end}}
    </div>
</body>
</html>
